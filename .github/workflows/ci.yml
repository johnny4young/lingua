name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs when a new commit lands on the same branch /
# PR — the older run becomes irrelevant the moment a fix is pushed,
# so finishing it is pure waste of GitHub Actions budget.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default token: CI only reads the repo and runs gates;
# nothing here needs write scope. Jobs can still escalate per-job if a
# future step requires it.
permissions:
  contents: read

jobs:
  # All Linux gates collapsed into one job so we pay one pnpm install per
  # run instead of six times. Each gate stays distinct as a named step
  # so failures still pinpoint exactly what broke. ~5 min saved per
  # run vs six parallel jobs.
  linux-gates:
    name: Linux gates (build + typecheck + lint + i18n + changelog + test + audit)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.x'
          cache: 'pnpm'
          # RL-080 Slice 1 — also key the pnpm cache on the
          # update-server lockfile so the worker's install (added
          # below) reuses cached deps instead of taking a cold install
          # on every CI run.
          cache-dependency-path: |
            pnpm-lock.yaml
            update-server/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm exec tsc --noEmit
      # RL-132 / AUDIT-12 — the root tsconfig only includes src/**, so the
      # `tsc --noEmit` above never type-checks files under tests/. This
      # scoped pass pulls tests/main/projectCapabilitiesBrand.test.ts into
      # a real tsc program so its `@ts-expect-error` swap matrix becomes a
      # gate: revert any branded id to a bare string and this step fails
      # with TS2578 'unused @ts-expect-error directive'. The vitest run
      # below also enforces this via a shell-out, but this step fails fast
      # and pinpoints the regression.
      - name: Type check (tests compile guards)
        run: pnpm run typecheck:tests
      - name: Lint
        run: pnpm run lint
      - name: i18n keys
        run: pnpm run check:i18n
      - name: i18n copy guard
        run: pnpm run check:i18n:copy
      - name: Changelog/version guard
        run: pnpm run changelog:check
      # RL-143 — PR-time mirror of the release-blocking rotation gate so a
      # license-key SLA breach surfaces the week it happens instead of on
      # release day. Note main can go red purely by time passing the SLA;
      # that pressure is deliberate — rotate per docs/RELEASE_SECURITY.md.
      - name: License-key rotation policy
        run: pnpm run check:license-rotation
      - name: Tests
        run: pnpm test
      # RL-080 Slice 1 — the update-server has its own tsconfig and
      # vitest config outside the root TypeScript project. Wire both
      # gates into CI so the `/update/:platform/:version` smoke landed
      # for RL-080 actually gates pull requests. Run block uses only
      # static pnpm commands — no github.event inputs are interpolated,
      # so the workflow is not exposed to script injection.
      - name: Update-server gates
        working-directory: update-server
        run: |
          pnpm install --frozen-lockfile
          pnpm run typecheck
          pnpm test
      - name: Build web
        run: pnpm run build:web
      - name: Performance report
        run: pnpm run performance:report
      - name: Performance budget check
        run: pnpm run check:performance
      - name: Third-party license policy
        run: pnpm run check:licenses
      # RL-145 — blocking production-graph audit at PR time. The release
      # pipeline already gated prod advisories (RL-080); this brings the
      # same fail-closed gate to every PR so a prod high/critical dep is
      # caught before merge, not only at release. The dev-inclusive full
      # audit below stays advisory by design (see docs/RELEASE_SECURITY.md).
      - name: Production dependency audit (blocking)
        run: pnpm run check:prod-audit
      - name: Security audit (advisory, full graph)
        run: pnpm audit --audit-level high
        continue-on-error: true

  windows-path-hardening:
    name: Windows path hardening
    runs-on: windows-latest
    timeout-minutes: 20
    # Windows runners count 2× against the Actions budget, and the
    # path-hardening test is a regression guard that only matters
    # when changes land on main. Skip on push (the linux-gates job
    # ran on the PR already), keep on PR so the catch is at review
    # time. Saves ~6-10 min per direct push to main.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.x'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test -- tests/ipc/permissions.test.ts
