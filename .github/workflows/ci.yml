name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs when a new commit lands on the same branch /
# PR — the older run becomes irrelevant the moment a fix is pushed,
# so finishing it is pure waste of GitHub Actions budget.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # All Linux gates collapsed into one job so we pay `npm ci` once per
  # run instead of six times. Each gate stays distinct as a named step
  # so failures still pinpoint exactly what broke. ~5 min saved per
  # run vs six parallel jobs.
  linux-gates:
    name: Linux gates (build + typecheck + lint + i18n + test + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          # RL-080 Slice 1 — also key the npm cache on the
          # update-server lockfile so the worker's `npm ci` (added
          # below) reuses cached deps instead of taking a 20-30s cold
          # install on every CI run.
          cache-dependency-path: |
            package-lock.json
            update-server/package-lock.json
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: i18n keys
        run: npm run check:i18n
      - name: i18n copy guard
        run: npm run check:i18n:copy
      - name: Tests
        run: npm test
      # RL-080 Slice 1 — the update-server has its own tsconfig and
      # vitest config outside the root TypeScript project. Wire both
      # gates into CI so the `/update/:platform/:version` smoke landed
      # for RL-080 actually gates pull requests. Run block uses only
      # static npm commands — no github.event inputs are interpolated,
      # so the workflow is not exposed to script injection.
      - name: Update-server gates
        working-directory: update-server
        run: |
          npm ci
          npm run typecheck
          npm test
      - name: Build web
        run: npm run build:web
      - name: Performance report
        run: npm run performance:report
      - name: Performance budget check
        run: npm run check:performance
      - name: Third-party license policy
        run: npm run check:licenses
      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  windows-path-hardening:
    name: Windows path hardening
    runs-on: windows-latest
    # Windows runners count 2× against the Actions budget, and the
    # path-hardening test is a regression guard that only matters
    # when changes land on main. Skip on push (the linux-gates job
    # ran on the PR already), keep on PR so the catch is at review
    # time. Saves ~6-10 min per direct push to main.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm test -- tests/ipc/permissions.test.ts
