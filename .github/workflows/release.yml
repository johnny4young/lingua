name: Release
run-name: Release ${{ inputs.release_tag }}

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Stable tag to publish (vX.Y.Z)
        required: true
        type: string
      release_macos:
        description: Build and publish the macOS installers (~10x GH Actions minutes)
        required: false
        type: boolean
        default: true
      release_windows:
        description: Build and publish the Windows installers (~2x GH Actions minutes)
        required: false
        type: boolean
        default: true
      release_linux:
        description: Build and publish the Linux installers (~1x GH Actions minutes)
        required: false
        type: boolean
        default: true
      release_web:
        description: Build and deploy the web bundle to Cloudflare Pages (app.linguacode.dev)
        required: false
        type: boolean
        default: true
      release_skip_packaged_smoke:
        description: Skip the packaged desktop smoke gate (use only when actively debugging the smoke harness)
        required: false
        type: boolean
        default: false

env:
  RELEASE_TAG: ${{ inputs.release_tag }}
  RELEASE_REF: refs/tags/${{ inputs.release_tag }}
  TARGET_REF: refs/heads/main
  # Lift the Node heap so Vite/Rollup can bundle Monaco + Pyodide + plugins
  # without an out-of-memory GC death-spiral during the desktop bundle build.
  NODE_OPTIONS: --max-old-space-size=4096

# Never run two releases of the same tag concurrently; let an in-flight
# release finish rather than cancel it mid-publish.
concurrency:
  group: release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  prepare-release-tag:
    name: Prepare release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TARGET_REF }}
          fetch-depth: 0

      - name: Validate release input
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Manual releases only accept stable tags in the form vX.Y.Z."
            exit 1
          fi

          if ! git rev-parse HEAD >/dev/null 2>&1; then
            echo "::error::Target ref ${TARGET_REF} could not be resolved."
            exit 1
          fi

          echo "Release channel: stable"
          echo "Release tag: ${RELEASE_TAG}"
          echo "Release target ref: main"

      - name: Create or reuse release tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags origin

          target_sha="$(git rev-parse HEAD)"

          if git rev-parse "${RELEASE_REF}" >/dev/null 2>&1; then
            existing_sha="$(git rev-list -n 1 "${RELEASE_REF}")"
            if [[ "${existing_sha}" != "${target_sha}" ]]; then
              echo "::error::Tag ${RELEASE_TAG} already exists and points to ${existing_sha}, not ${target_sha} from main."
              exit 1
            fi

            echo "Reusing existing tag ${RELEASE_TAG} at ${existing_sha}"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}" "${target_sha}"
            git push origin "${RELEASE_REF}"
            echo "Created tag ${RELEASE_TAG} at ${target_sha}"
          fi

  # Release-blocking compliance + security gates. The run blocks use only
  # static pnpm commands plus the already-validated RELEASE_TAG env value, so
  # there is no script-injection surface.
  security-audit:
    name: Security audit (release-blocking)
    runs-on: ubuntu-latest
    needs: prepare-release-tag
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.x'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Check changelog and release version
        run: pnpm run changelog:check -- --release-tag "${RELEASE_TAG}" --from "${RELEASE_TAG}"
      - name: Check third-party license policy
        run: pnpm run check:licenses
      - name: Generate release compliance artifacts
        run: pnpm run compliance:release
      - name: Upload release compliance artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compliance-artifacts
          path: output/release-compliance/*
          if-no-files-found: error
      # Fail closed when the embedded license-signing public key is undocumented,
      # not active, drifted between .env and .env.production, or past the rotation
      # SLA. Every build job and deploy-web depend on this job.
      - name: Assert license-key rotation policy
        run: pnpm run check:license-rotation
      - name: Run blocking production audit
        run: pnpm run check:prod-audit
      - name: Run advisory full audit
        run: pnpm audit --audit-level high
        continue-on-error: true

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: [prepare-release-tag, security-audit]
    if: ${{ inputs.release_macos }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.x'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Build desktop bundles
        run: pnpm run build:desktop-bundles

      # electron-builder owns code-signing, notarization, and stapling. When the
      # Apple secrets are present it imports the p12 into its own throwaway
      # keychain (no ambiguity with the runner's keychain), signs with the
      # hardened runtime + entitlements, notarizes via notarytool, and staples —
      # failing the build if any step fails. Without the secrets it falls back to
      # an ad-hoc signature (builds complete but are not Gatekeeper-distributable).
      - name: Build and sign macOS installers
        shell: bash
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [[ -n "${APPLE_CERT_P12_BASE64:-}" && -n "${APPLE_CERT_PASSWORD:-}" \
                && -n "${APPLE_ID:-}" && -n "${APPLE_ID_PASSWORD:-}" && -n "${APPLE_TEAM_ID:-}" ]]; then
            echo "macOS signing + notarization: enabled"
            echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/lingua-cert.p12"
            export CSC_LINK="$RUNNER_TEMP/lingua-cert.p12"
            export CSC_KEY_PASSWORD="$APPLE_CERT_PASSWORD"
            # electron-builder reads these for notarytool.
            export APPLE_APP_SPECIFIC_PASSWORD="$APPLE_ID_PASSWORD"
            npx electron-builder --mac --publish never -c.mac.notarize=true
          else
            echo "::warning::Apple signing secrets are not all set — building an ad-hoc-signed (non-distributable) macOS build."
            npx electron-builder --mac --publish never -c.mac.identity=-
          fi

      - name: Verify macOS artifacts
        shell: bash
        run: |
          set -euo pipefail
          if ! find out-builder -maxdepth 1 -type f -name '*.dmg' -print -quit | grep -q .; then
            echo "::error::Expected a macOS .dmg in out-builder"
            find out-builder -maxdepth 1 -type f -print || true
            exit 1
          fi
          test -f out-builder/latest-mac.yml || { echo "::error::Missing out-builder/latest-mac.yml update manifest"; exit 1; }
          node --input-type=module <<'NODE'
          import { existsSync, readFileSync } from 'node:fs';
          import path from 'node:path';

          const manifest = readFileSync(path.join('out-builder', 'latest-mac.yml'), 'utf8');
          const zipRefs = [
            ...manifest.matchAll(/^\s*(?:path|url):\s*["']?([^"'\r\n#]+?\.zip)["']?\s*$/gmu),
          ].map((match) => match[1]);

          if (zipRefs.length === 0) {
            console.error('::error::latest-mac.yml does not reference a macOS .zip update asset');
            process.exit(1);
          }

          const missingRefs = zipRefs.filter((ref) => {
            const artifactName = path.basename(ref);
            return !existsSync(path.join('out-builder', artifactName));
          });

          if (missingRefs.length > 0) {
            console.error(
              `::error::latest-mac.yml references missing macOS .zip asset(s): ${missingRefs.join(', ')}`
            );
            process.exit(1);
          }
          NODE
          echo "Verified macOS dmg + latest-mac.yml referenced zip"

      # Packaged smoke against the produced app: boots, loads the renderer
      # chunks, and runs the vendored Pyodide runtime offline. Skippable via the
      # release_skip_packaged_smoke input when debugging the harness.
      - name: Packaged desktop smoke
        if: ${{ !inputs.release_skip_packaged_smoke }}
        shell: bash
        env:
          LINGUA_SMOKE_TIMEOUT_MS: '360000'
        run: pnpm run smoke:desktop:packaged

      - name: Upload packaged smoke artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-packaged-smoke
          path: output/playwright/desktop-smoke/**/*
          if-no-files-found: ignore

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-artifacts
          path: |
            out-builder/*.dmg
            out-builder/*.zip
            out-builder/*.blockmap
            out-builder/latest-mac.yml
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [prepare-release-tag, security-audit]
    if: ${{ inputs.release_windows }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.x'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Build desktop bundles
        run: pnpm run build:desktop-bundles

      # Authenticode signing is gated on the cert secrets: present -> signed NSIS,
      # absent -> unsigned NSIS (no cascading failure, so a missing cert never
      # blocks a macOS/Linux/web release).
      - name: Build and sign Windows installer
        shell: bash
        env:
          WIN_CERT_FILE: ${{ secrets.WIN_CERT_FILE }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -n "${WIN_CERT_FILE:-}" && -n "${WIN_CERT_PASSWORD:-}" ]]; then
            echo "Windows signing: enabled"
            echo "$WIN_CERT_FILE" | base64 --decode > "$RUNNER_TEMP/lingua-cert.pfx"
            export CSC_LINK="$RUNNER_TEMP/lingua-cert.pfx"
            export CSC_KEY_PASSWORD="$WIN_CERT_PASSWORD"
            npx electron-builder --win --publish never
          else
            echo "::warning::WIN_CERT_FILE/WIN_CERT_PASSWORD not set — building an unsigned Windows installer."
            npx electron-builder --win --publish never
          fi

      - name: Verify Windows artifacts
        shell: bash
        run: |
          set -euo pipefail
          if ! find out-builder -maxdepth 1 -type f -name '*.exe' -print -quit | grep -q .; then
            echo "::error::Expected a Windows .exe installer in out-builder"
            exit 1
          fi
          test -f out-builder/latest.yml || { echo "::error::Missing out-builder/latest.yml update manifest"; exit 1; }
          echo "Verified Windows installer + latest.yml"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-artifacts
          path: |
            out-builder/*.exe
            out-builder/*.blockmap
            out-builder/latest.yml
          if-no-files-found: error

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [prepare-release-tag, security-audit]
    if: ${{ inputs.release_linux }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.x'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Build desktop bundles
        run: pnpm run build:desktop-bundles

      - name: Build Linux AppImage
        run: npx electron-builder --linux --publish never

      - name: Verify Linux artifacts
        shell: bash
        run: |
          set -euo pipefail
          if ! find out-builder -maxdepth 1 -type f -name '*.AppImage' -print -quit | grep -q .; then
            echo "::error::Expected a Linux .AppImage in out-builder"
            exit 1
          fi
          test -f out-builder/latest-linux.yml || { echo "::error::Missing out-builder/latest-linux.yml update manifest"; exit 1; }
          echo "Verified Linux AppImage + latest-linux.yml"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-artifacts
          path: |
            out-builder/*.AppImage
            out-builder/*.blockmap
            out-builder/latest-linux.yml
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [build-macos, build-windows, build-linux]
    # `always()` so a skipped build (release_macos=false etc.) does not cancel
    # publish, but still require every SELECTED platform build to succeed so a
    # failed build can never produce a partial draft release.
    if: >-
      ${{
        always() &&
        (inputs.release_macos || inputs.release_windows || inputs.release_linux) &&
        (!inputs.release_macos || needs['build-macos'].result == 'success') &&
        (!inputs.release_windows || needs['build-windows'].result == 'success') &&
        (!inputs.release_linux || needs['build-linux'].result == 'success')
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: out-builder
          merge-multiple: true

      - name: Verify downloaded release payload
        shell: bash
        run: |
          set -euo pipefail
          if ! find out-builder -type f -print -quit | grep -q .; then
            echo "::error::No release artifacts were downloaded into out-builder"
            exit 1
          fi
          # electron-updater needs at least one latest*.yml feed manifest on the
          # release; without it the published build cannot auto-update.
          if ! find out-builder -maxdepth 1 -type f -name 'latest*.yml' -print -quit | grep -q .; then
            echo "::error::No electron-updater latest*.yml feed manifest found in the payload"
            exit 1
          fi
          echo "Verified downloaded release payload"

      - name: Generate release checksums
        shell: bash
        run: |
          set -euo pipefail
          cd out-builder
          : > SHA256SUMS.txt
          shopt -s nullglob
          for f in *.dmg *.zip *.exe *.AppImage; do
            shasum -a 256 "$f" >> SHA256SUMS.txt
          done
          {
            echo "### Release checksums"
            echo '```'
            cat SHA256SUMS.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish draft GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Installers + blockmaps + the electron-updater feed manifests + the
          # checksum file. The latest*.yml files are what the packaged app reads
          # from this Release to auto-update.
          shopt -s nullglob
          mapfile -t assets < <(printf '%s\n' \
            out-builder/*.dmg out-builder/*.zip out-builder/*.exe out-builder/*.AppImage \
            out-builder/*.blockmap out-builder/latest*.yml out-builder/SHA256SUMS.txt)

          if release_is_draft="$(gh release view "${RELEASE_TAG}" --json isDraft --jq .isDraft 2>/dev/null)"; then
            if [[ "${release_is_draft}" != "true" ]]; then
              echo "::error::Release ${RELEASE_TAG} already exists and is not a draft; refusing to clobber published assets."
              exit 1
            fi
            echo "Draft release ${RELEASE_TAG} already exists; uploading assets in place."
            gh release upload "${RELEASE_TAG}" --clobber "${assets[@]}"
          else
            gh release create "${RELEASE_TAG}" \
              --target main \
              --title "${RELEASE_TAG}" \
              --draft \
              --notes "Draft release for ${RELEASE_TAG}. Run the human checklist in RELEASE.md before promoting." \
              "${assets[@]}"
          fi

  deploy-web:
    name: Deploy web bundle to Cloudflare Pages
    needs: [publish, security-audit]
    # Always runs when release_web is enabled, even if publish was skipped
    # (web-only release path). The security-audit need keeps web-only releases
    # behind the same release-blocking audit. If any desktop platform was
    # selected, require publish to have succeeded first.
    if: >-
      ${{
        always() &&
        inputs.release_web &&
        needs.security-audit.result == 'success' &&
        (
          (!inputs.release_macos && !inputs.release_windows && !inputs.release_linux) ||
          needs.publish.result == 'success'
        )
      }}
    permissions:
      contents: read
    uses: ./.github/workflows/deploy-web.yml
    with:
      ref: refs/tags/${{ inputs.release_tag }}
    secrets: inherit

  # The marketing site (website/) redeploys on release automatically: its
  # deploy-website.yml workflow triggers on `release: published`, so no
  # cross-repo dispatch is needed here. The old notify-marketing job that poked
  # a separate lingua-marketing repo via a MARKETING_SYNC_TOKEN PAT was removed
  # when the site moved into website/ (content is now vendored locally from the
  # repo root — no cross-repo sync).
