name: Release
run-name: Release ${{ inputs.release_tag }}

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Stable tag to publish (vX.Y.Z)
        required: true
        type: string

env:
  RELEASE_TAG: ${{ inputs.release_tag }}
  RELEASE_REF: refs/tags/${{ inputs.release_tag }}
  TARGET_REF: refs/heads/main

jobs:
  prepare-release-tag:
    name: Prepare release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF }}
          fetch-depth: 0

      - name: Validate release input
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Manual releases only accept stable tags in the form vX.Y.Z."
            exit 1
          fi

          if ! git rev-parse HEAD >/dev/null 2>&1; then
            echo "::error::Target ref ${TARGET_REF} could not be resolved."
            exit 1
          fi

          echo "Release channel: stable"
          echo "Release tag: ${RELEASE_TAG}"
          echo "Release target ref: main"

      - name: Create or reuse release tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags origin

          target_sha="$(git rev-parse HEAD)"

          if git rev-parse "${RELEASE_REF}" >/dev/null 2>&1; then
            existing_sha="$(git rev-list -n 1 "${RELEASE_REF}")"
            if [[ "${existing_sha}" != "${target_sha}" ]]; then
              echo "::error::Tag ${RELEASE_TAG} already exists and points to ${existing_sha}, not ${target_sha} from main."
              exit 1
            fi

            echo "Reusing existing tag ${RELEASE_TAG} at ${existing_sha}"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}" "${target_sha}"
            git push origin "${RELEASE_REF}"
            echo "Created tag ${RELEASE_TAG} at ${target_sha}"
          fi

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: prepare-release-tag
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Validate macOS signing inputs
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          for var in APPLE_ID APPLE_ID_PASSWORD APPLE_TEAM_ID APPLE_SIGNING_IDENTITY APPLE_CERT_P12_BASE64 APPLE_CERT_PASSWORD; do
            if [[ -z "${!var:-}" ]]; then
              missing+=("$var")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required macOS release secrets: ${missing[*]}"
            exit 1
          fi

          echo "macOS signing: enabled"
          echo "macOS notarization: enabled"

      - name: Import macOS signing certificate
        shell: bash
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/lingua-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/lingua-signing.p12"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "APPLE_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build macOS artifacts
        run: npm run make:desktop:mac
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - name: Verify macOS artifacts
        shell: bash
        run: |
          set -euo pipefail
          if ! find out/make -type f -name '*.zip' -print -quit | grep -q .; then
            echo "::error::Expected at least one macOS ZIP artifact in out/make"
            exit 1
          fi
          echo "Verified macOS ZIP artifacts in out/make"

      - name: Verify macOS signing
        shell: bash
        run: |
          set -euo pipefail
          app_bundle="$(find out -type d -name 'Lingua.app' -print -quit)"
          if [[ -z "${app_bundle:-}" ]]; then
            echo "::error::Could not find Lingua.app for macOS signing verification"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_bundle"
          codesign -dv --verbose=4 "$app_bundle" 2>&1 | tee /tmp/lingua-codesign.txt

          echo "macOS signing verification: passed"
          {
            echo "### macOS signing"
            echo "- App bundle: \`$app_bundle\`"
            echo "- Verification: passed"
            echo "- Identity:"
            echo '```'
            grep '^Authority=' /tmp/lingua-codesign.txt || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: out/make/**/*
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: prepare-release-tag
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Validate Windows signing inputs
        shell: bash
        env:
          WIN_CERT_FILE: ${{ secrets.WIN_CERT_FILE }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          for var in WIN_CERT_FILE WIN_CERT_PASSWORD; do
            if [[ -z "${!var:-}" ]]; then
              missing+=("$var")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required Windows release secrets: ${missing[*]}"
            exit 1
          fi

          echo "Windows signing: enabled"

      - name: Materialize Windows signing certificate
        shell: pwsh
        env:
          WIN_CERT_FILE: ${{ secrets.WIN_CERT_FILE }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'lingua-signing.pfx'
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WIN_CERT_FILE))
          "WIN_CERT_FILE=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Windows signing certificate written to runner temp path"

      - name: Build Windows artifacts
        run: npm run make:desktop:win
        env:
          WIN_CERT_FILE: ${{ env.WIN_CERT_FILE }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}

      - name: Verify Windows artifacts
        shell: bash
        run: |
          set -euo pipefail
          if ! find out/make -type f \( -name '*.exe' -o -name '*.nupkg' -o -name 'RELEASES' \) -print -quit | grep -q .; then
            echo "::error::Expected Windows installer/update artifacts in out/make"
            exit 1
          fi
          echo "Verified Windows release artifacts in out/make"

      - name: Verify Windows signing
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path out/make -Recurse -Filter *.exe | Select-Object -First 1
          if (-not $exe) {
            Write-Error 'Could not find a Windows executable for signing verification'
            exit 1
          }

          $signature = Get-AuthenticodeSignature $exe.FullName
          if ($signature.Status -ne 'Valid') {
            Write-Error "Windows signing verification failed with status: $($signature.Status)"
            exit 1
          }

          Write-Host "Windows signing verification: $($signature.Status)"
          @"
          ### Windows signing
          - Executable: `$($exe.FullName)`
          - Verification: $($signature.Status)
          - Signer: $($signature.SignerCertificate.Subject)
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: out/make/**/*
          if-no-files-found: error

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: prepare-release-tag
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot

      - name: Report Linux signing state
        run: |
          echo "Linux signing: not configured"

      - name: Build Linux artifacts
        run: npm run make:desktop:linux

      - name: Verify Linux artifacts
        shell: bash
        run: |
          set -euo pipefail
          if ! find out/make -type f \( -name '*.deb' -o -name '*.rpm' \) -print -quit | grep -q .; then
            echo "::error::Expected Linux package artifacts in out/make"
            exit 1
          fi
          echo "Verified Linux release artifacts in out/make"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: out/make/**/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: out/make
          merge-multiple: true

      - name: Verify downloaded release payload
        shell: bash
        run: |
          set -euo pipefail
          if ! find out/make -type f -print -quit | grep -q .; then
            echo "::error::No release artifacts were downloaded into out/make"
            exit 1
          fi
          echo "Verified downloaded release payload"

      - name: Generate release checksums
        shell: bash
        run: |
          set -euo pipefail
          cd out/make
          find . -type f ! -name 'SHA256SUMS.txt' -print0 \
            | sort -z \
            | xargs -0 shasum -a 256 > SHA256SUMS.txt

          echo "Generated SHA256SUMS.txt"
          {
            echo "### Release checksums"
            echo "- Generated: \`out/make/SHA256SUMS.txt\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish to GitHub Releases
        run: npm run publish:desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REF: ${{ env.RELEASE_REF }}
          GITHUB_REF_NAME: ${{ env.RELEASE_TAG }}
          GITHUB_REF_TYPE: tag
