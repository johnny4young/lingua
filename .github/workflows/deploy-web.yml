name: Deploy web build to Cloudflare Pages

# RL-061 Slice 5 — migrated from GitHub Pages to Cloudflare Pages so
# the web build can live at the dedicated app.linguacode.dev
# subdomain alongside the worker family (licenses.*, updates.*, app.*).
# linguacode.dev itself stays reserved for the future
# lingua-marketing repo (filed in BACKLOG).
#
# workflow_call lets release.yml invoke this from the orchestrated
# release pipeline. workflow_dispatch stays for manual ad-hoc deploys.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        type: string
        default: refs/heads/main
  workflow_call:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        type: string
        default: refs/heads/main

# The build + Cloudflare Pages deploy read the repo and use Cloudflare
# secrets; no GitHub write scope is needed.
permissions:
  contents: read

# Serialize web deploys (manual dispatch + the release pipeline's
# workflow_call share this group); never cancel an in-flight publish.
concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Start Cloudflare deploy validation artifact
        shell: bash
        env:
          DEPLOY_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          mkdir -p output/cloudflare-deploy-validation
          {
            echo "# Cloudflare deploy validation"
            echo
            echo "- Ref: ${DEPLOY_REF}"
            echo "- Workflow run: ${GITHUB_RUN_ID}"
            echo "- Started: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > output/cloudflare-deploy-validation/README.md

      - name: Build web bundle
        env:
          # CF Pages serves the bundle at the subdomain root
          # (app.linguacode.dev/), not under a /lingua/ path prefix
          # as the legacy GH Pages deploy did.
          VITE_BASE_PATH: /
          # RL-065 Slice 5 — point the web bundle at the telemetry
          # ingest endpoint on the update-server worker. Only the
          # web build sets this; the desktop release workflow leaves
          # it unset so packaged desktop builds stay telemetry-off
          # by default (the renderer emitter no-ops without an
          # endpoint, per `src/renderer/utils/telemetry.ts`). Local
          # developers can override via `.env.local` to point at
          # `http://localhost:8787/telemetry` with `wrangler dev`.
          VITE_LINGUA_TELEMETRY_URL: https://updates.linguacode.dev/telemetry
          # Lift the Node.js heap from the 4 GB default to 8 GB so
          # Vite/Rollup can finish bundling Monaco + i18n + plugins
          # without an out-of-memory GC death-spiral. The
          # ubuntu-latest runner ships with 16 GB RAM, so 8 GB leaves
          # comfortable headroom for the OS + dev-deps. Local macs
          # never hit this because their default heap budget is
          # bigger; the failure shows up only on CI runners with the
          # smaller default.
          NODE_OPTIONS: --max-old-space-size=8192
        run: pnpm run build:web

      - name: Deploy to Cloudflare Pages
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          pnpm exec wrangler pages deploy dist/web \
            --project-name lingua-web \
            --branch main \
            2>&1 | tee output/cloudflare-deploy-validation/wrangler-pages-deploy.log

      - name: Purge Cloudflare cache for app.linguacode.dev
        # Purges the entire linguacode.dev zone so any user with a
        # long-lived tab on the previous bundle picks up the new
        # index.html (and therefore the new asset hashes) on next
        # navigation. The zone covers app/licenses/updates subdomains
        # but only the static HTML benefits — the worker endpoints
        # already set Cache-Control: no-store so their responses are
        # never cached at the edge.
        #
        # `continue-on-error: true` is intentional: cache purge is
        # best-effort. If the API token lacks Zone:Cache Purge:Purge
        # scope (returns 401), the deploy itself already succeeded
        # and CF Pages serves the new bundle from the next 5-min
        # cache cycle on. Failing the workflow over a missed purge
        # would mask the deploy success.
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          if [[ -z "${CLOUDFLARE_ZONE_ID:-}" ]]; then
            echo "::warning::CLOUDFLARE_ZONE_ID secret not configured — skipping cache purge."
            exit 0
          fi
          curl --fail --silent --show-error \
            --request POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --data '{"purge_everything": true}' \
            > /tmp/purge.json
          echo "Cache purge response:"
          cat /tmp/purge.json

      - name: Validate deployed web surface
        shell: bash
        env:
          APP_URL: https://app.linguacode.dev
          WEB_VERSION_URL: https://updates.linguacode.dev/web/version
          DEPLOY_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail

          validation_dir="output/cloudflare-deploy-validation"
          index_file="${validation_dir}/app-index.html"
          sw_file="${validation_dir}/sw.js"
          version_file="${validation_dir}/web-version.json"
          summary_file="${validation_dir}/web-validation.md"
          result_file="${validation_dir}/web-validation.json"

          fetch_until_status() {
            local label="$1"
            local url="$2"
            local output="$3"
            local allowed_regex="$4"
            local status=""

            for attempt in 1 2 3 4 5 6; do
              status="$(curl --silent --show-error --location --max-time 20 --output "${output}" --write-out "%{http_code}" "${url}" || true)"
              if [[ "${status}" =~ ${allowed_regex} ]]; then
                echo "${status}"
                return 0
              fi

              echo "::warning::${label} returned ${status:-curl-error} on attempt ${attempt}; retrying." >&2
              sleep 10
            done

            echo "::error::${label} did not return an expected status after retries. Last status: ${status:-curl-error}." >&2
            return 1
          }

          index_status="$(fetch_until_status "App shell" "${APP_URL}/" "${index_file}" '^(200)$')"
          sw_status="$(fetch_until_status "Service worker" "${APP_URL}/sw.js" "${sw_file}" '^(200)$')"
          version_status="$(fetch_until_status "Version endpoint" "${WEB_VERSION_URL}" "${version_file}" '^(200|204)$')"

          if [[ "${index_status}" != "200" ]]; then
            echo "::error::Expected ${APP_URL}/ to return 200, got ${index_status}."
            exit 1
          fi

          if [[ "${sw_status}" != "200" ]]; then
            echo "::error::Expected ${APP_URL}/sw.js to return 200, got ${sw_status}."
            exit 1
          fi

          if [[ "${version_status}" != "200" && "${version_status}" != "204" ]]; then
            echo "::error::Expected ${WEB_VERSION_URL} to return 200 or 204, got ${version_status}."
            exit 1
          fi

          if ! grep -q 'id="root"' "${index_file}"; then
            echo "::error::Deployed app shell does not contain the React root."
            exit 1
          fi

          if ! grep -q 'https://updates.linguacode.dev' "${index_file}"; then
            echo "::error::Deployed app shell CSP does not allow the update banner endpoint."
            exit 1
          fi

          if ! grep -q 'https://updates.linguacode.dev' "${sw_file}"; then
            echo "::error::Deployed service worker does not bypass the update-version endpoint."
            exit 1
          fi

          if [[ "${version_status}" == "200" ]] && ! grep -Eq '"version"[[:space:]]*:[[:space:]]*"[0-9]+\.[0-9]+\.[0-9]+"' "${version_file}"; then
            echo "::error::Update version endpoint returned 200 without a semver version payload."
            exit 1
          fi

          env \
            VERSION_FILE="${version_file}" \
            RESULT_FILE="${result_file}" \
            DEPLOY_REF="${DEPLOY_REF}" \
            APP_URL="${APP_URL}" \
            WEB_VERSION_URL="${WEB_VERSION_URL}" \
            INDEX_STATUS="${index_status}" \
            SW_STATUS="${sw_status}" \
            VERSION_STATUS="${version_status}" \
            node -e 'const fs = require("node:fs"); const read = (name) => fs.existsSync(name) ? fs.readFileSync(name, "utf8").trim() : ""; const versionBody = read(process.env.VERSION_FILE); const match = versionBody.match(/"version"\s*:\s*"([^"]+)"/); fs.writeFileSync(process.env.RESULT_FILE, `${JSON.stringify({ ref: process.env.DEPLOY_REF, appUrl: process.env.APP_URL, versionUrl: process.env.WEB_VERSION_URL, indexStatus: process.env.INDEX_STATUS, serviceWorkerStatus: process.env.SW_STATUS, versionStatus: process.env.VERSION_STATUS, version: match?.[1] ?? null }, null, 2)}\n`);'

          {
            echo "# Web deploy validation"
            echo
            echo "| Check | Result |"
            echo "|---|---|"
            echo "| App shell | ${APP_URL}/ returned ${index_status} and includes #root |"
            echo "| Update CSP | app shell allows updates.linguacode.dev |"
            echo "| Service worker | sw.js bypasses updates.linguacode.dev |"
            echo "| Version endpoint | ${WEB_VERSION_URL} returned ${version_status} |"
          } > "${summary_file}"

      - name: Upload Cloudflare deploy validation
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cloudflare-deploy-validation
          path: output/cloudflare-deploy-validation/*
          if-no-files-found: error
