name: Deploy Update Server

on:
  workflow_dispatch:

# Deploys read the repo and use Cloudflare secrets; no GitHub write
# scope is needed.
permissions:
  contents: read

# Never run two update-server deploys at once; let an in-flight deploy
# finish rather than cancel it mid-publish.
concurrency:
  group: deploy-update-server
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: update-server/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: update-server
        run: pnpm install --frozen-lockfile

      - name: Deploy Worker
        working-directory: update-server
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
