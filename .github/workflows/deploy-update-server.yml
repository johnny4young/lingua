name: Deploy Update Server

on:
  workflow_dispatch:

# Deploys read the repo and use Cloudflare secrets; no GitHub write
# scope is needed.
permissions:
  contents: read

# Never run two update-server deploys at once; let an in-flight deploy
# finish rather than cancel it mid-publish.
concurrency:
  group: deploy-update-server
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24.x'
          cache: 'pnpm'
          cache-dependency-path: update-server/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: update-server
        run: pnpm install --frozen-lockfile

      - name: Deploy Worker
        working-directory: update-server
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
