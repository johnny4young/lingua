title = "Lingua Gitleaks configuration"

[extend]
useDefault = true

[[allowlists]]
description = "Trial server tests use a deterministic dummy token fixture."
condition = "AND"
regexTarget = "match"
paths = ['''tests/services/trialServer\.test\.ts''']
regexes = ['''tok_1\.signature''']

[[allowlists]]
description = "Polar webhook tests use a documented whsec_ test fixture."
condition = "AND"
regexTarget = "match"
paths = ['''license-server/test/webhooks\.test\.ts''']
regexes = ['''whsec_dGVzdC1zZWNyZXQ=''']

[[allowlists]]
description = "cURL converter tests use alice:secret as a local parser fixture."
condition = "AND"
regexTarget = "match"
paths = ['''tests/utils/curlToCode\.test\.ts''']
regexes = ['''alice:secret''']

[[allowlists]]
description = "README feature copy says license-key infrastructure; it is not a key."
condition = "AND"
regexTarget = "line"
paths = ['''README\.md''']
regexes = ['''Commercial license-key infrastructure''']

[[allowlists]]
description = "cURL importer tests use admin:hunter2 / secret-token as local parser fixtures."
condition = "AND"
regexTarget = "match"
paths = ['''tests/shared/importers/curlImporter\.test\.ts''']
regexes = ['''admin:hunter2''', '''secret-token''']

[[allowlists]]
description = "Redaction-preview test uses an sk-test- dummy key it asserts is redacted."
condition = "AND"
regexTarget = "match"
paths = ['''tests/utils/redactionPreview\.test\.ts''']
regexes = ['''sk-test-[A-Za-z0-9]+''']

[[allowlists]]
description = "Historic smart-paste tests used a deterministic unsigned JWT-shaped fixture."
condition = "AND"
regexTarget = "match"
paths = [
  '''tests/hooks/useSmartPaste\.test\.tsx''',
  '''tests/renderer/clipboard/pasteHandlers\.test\.ts''',
  '''tests/e2e/smartPasteUtilities\.spec\.ts''',
]
regexes = ['''eyJhbGciOiJIUzI1Ni[^[:space:]'\"]+c2lnbmF0dXJl''']
