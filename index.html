<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      RL-140 (AUDIT-20) — declares both schemes so the browser paints
      scrollbars and form controls correctly before the theme bootstrap
      script below narrows it via root.style.colorScheme. Dark first:
      it is the app default when no preference is persisted.
    -->
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0c1017" />
    <!--
      RL-083 Slice 1 — desktop CSP no longer allowlists
      cdn.jsdelivr.net. Pyodide assets ship inside the renderer
      output via build/copyRuntimeAssetsPlugin.mts and load from the
      same origin as the renderer (file:// when packaged,
      http://localhost:5173 in dev). The web build keeps jsdelivr
      until Slice 2 completes the first-party hosting decision; see
      docs/RUNTIME_ASSETS_ADR.md.

      T19 / RL-031 — connect-src additionally allows plain-http
      localhost/127.0.0.1 (any port) so the desktop app can reach a
      LOCAL AI server (Ollama, LM Studio, llama.cpp) for the
      explain-error feature — the local-first AI path. Remote https AI
      endpoints stay blocked on desktop by design until they route
      through the RL-097 T7 SSRF-guarded main proxy (see
      docs/LOCAL_AI_ADR.md); loopback-only keeps the audited RL-140
      no-exfil posture intact.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; worker-src 'self' blob:; connect-src 'self' https://licenses.linguacode.dev https://updates.linguacode.dev http://localhost:* http://127.0.0.1:*; base-uri 'self'; form-action 'self';"
    />
    <!--
      RL-140 (AUDIT-20) — early TLS handshakes to the two first-party
      hosts the renderer is allowed to reach (see connect-src above).
      crossorigin because the consumers are CORS fetch calls.
    -->
    <link rel="preconnect" href="https://licenses.linguacode.dev" crossorigin />
    <link rel="preconnect" href="https://updates.linguacode.dev" crossorigin />
    <!--
      RL-140 (AUDIT-20) — vendored JetBrains Mono (latin subset, OFL;
      see public/fonts/OFL.txt) so the Monaco default editor stack
      (settingsDefaults.ts DEFAULT_EDITOR_FONT_FAMILY) renders the same
      glyphs whether or not the user installed the font locally.
      Constraints the markup can't show:
      - URLs are document-relative (./fonts/...) because this entry is
        served from several roots: dev http://localhost:5173 and the
        packaged desktop build via file:// (loadFile in
        src/main/index.ts). Absolute /fonts/ breaks under file://.
      - @font-face lives inline (not in index.css) for the same reason:
        bundled CSS resolves relative url() against assets/, not the
        document, and Vite leaves absolute public-dir url() untouched.
        Inline style resolves against the document URL in every mode.
        Mirrored in src/web/index.html — keep both blocks in sync.
    -->
    <link
      rel="preload"
      href="./fonts/jetbrains-mono-latin-400-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="./fonts/jetbrains-mono-latin-700-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <style>
      @font-face {
        font-family: 'JetBrains Mono';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('./fonts/jetbrains-mono-latin-400-normal.woff2') format('woff2');
        unicode-range:
          U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308,
          U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'JetBrains Mono';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('./fonts/jetbrains-mono-latin-700-normal.woff2') format('woff2');
        unicode-range:
          U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308,
          U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
    </style>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Lingua</title>
    <script>
      (() => {
        const themeColors = {
          dark: '#0c1017',
          light: '#f4efe7',
        };

        const resolveEditorThemePolarity = (editorTheme) => {
          if (typeof editorTheme !== 'string' || editorTheme.length === 0) {
            return null;
          }
          // Must mirror resolveEffectiveShellTheme in useAppTheme.ts:
          // React derives shell polarity from the Monaco editor theme,
          // not from the legacy state.theme field. Unknown editor themes
          // fall back to dark, matching isDarkEditorTheme().
          const lightEditorThemes = new Set(['lingua-light', 'vs', 'solarized-light']);
          return lightEditorThemes.has(editorTheme) ? 'light' : 'dark';
        };

        const readStoredTheme = () => {
          // The storage read sits inside the try: with storage access
          // blocked (e.g. block-all-cookies in the web build) getItem
          // itself throws SecurityError, and an uncaught error here
          // would kill the bootstrap before any theme is applied.
          try {
            const storedState = window.localStorage.getItem('lingua-settings');
            if (!storedState) {
              return 'dark';
            }

            const parsed = JSON.parse(storedState);
            const directEditorTheme = resolveEditorThemePolarity(parsed?.editorTheme);
            if (directEditorTheme) {
              return directEditorTheme;
            }

            const persistedEditorTheme = resolveEditorThemePolarity(parsed?.state?.editorTheme);
            if (persistedEditorTheme) {
              return persistedEditorTheme;
            }

            const directTheme = parsed?.theme;
            if (directTheme === 'dark' || directTheme === 'light') {
              return directTheme;
            }

            const persistedTheme = parsed?.state?.theme;
            if (persistedTheme === 'dark' || persistedTheme === 'light') {
              return persistedTheme;
            }
          } catch {}

          return 'dark';
        };

        const theme = readStoredTheme();
        const root = document.documentElement;
        root.classList.remove('dark', 'light');
        root.classList.add(theme);
        root.dataset.theme = theme;
        root.style.colorScheme = theme;

        let themeColorMeta = document.querySelector('meta[name="theme-color"]');
        if (!themeColorMeta) {
          themeColorMeta = document.createElement('meta');
          themeColorMeta.name = 'theme-color';
          document.head.appendChild(themeColorMeta);
        }

        themeColorMeta.setAttribute('content', themeColors[theme]);
      })();
    </script>
    <!--
      IT2-G2 — first-paint shell. This block intentionally has no runtime
      dependency: it renders while the module graph, i18n catalog, and React
      bootstrap are still loading. The theme bootstrap above has already put
      dark/light on <html>, so these tokens match the persisted shell polarity
      without another inline script. Keep this block byte-for-byte aligned with
      src/web/index.html; tests/e2e/documentHead.spec.ts guards the contract.
    -->
    <style id="lingua-boot-skeleton-styles">
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
      }

      #lingua-boot-skeleton {
        --boot-bg: #0c1017;
        --boot-panel: #121824;
        --boot-panel-alt: #161e2b;
        --boot-border: #293446;
        --boot-muted: #536177;
        box-sizing: border-box;
        display: grid;
        grid-template-rows: 42px minmax(0, 1fr) 26px;
        min-height: 100vh;
        overflow: hidden;
        background: var(--boot-bg);
      }

      html.light #lingua-boot-skeleton {
        --boot-bg: #f4efe7;
        --boot-panel: #fcfaf6;
        --boot-panel-alt: #ebe4d9;
        --boot-border: #d4c9ba;
        --boot-muted: #b5aa9a;
      }

      #lingua-boot-skeleton,
      #lingua-boot-skeleton * {
        box-sizing: border-box;
      }

      .lingua-boot-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        border-bottom: 1px solid var(--boot-border);
        background: var(--boot-panel);
        padding: 0 14px;
      }

      .lingua-boot-dot,
      .lingua-boot-line,
      .lingua-boot-tab {
        display: block;
        border-radius: 999px;
        background: var(--boot-muted);
        opacity: 0.58;
      }

      .lingua-boot-dot {
        width: 8px;
        height: 8px;
      }

      .lingua-boot-tab {
        width: 94px;
        height: 12px;
        margin-left: 12px;
      }

      .lingua-boot-workspace {
        display: grid;
        grid-template-columns: 224px minmax(0, 1fr);
        min-height: 0;
      }

      .lingua-boot-sidebar {
        display: grid;
        align-content: start;
        gap: 13px;
        border-right: 1px solid var(--boot-border);
        background: var(--boot-panel);
        padding: 18px 14px;
      }

      .lingua-boot-editor {
        display: grid;
        grid-template-rows: 38px minmax(0, 1fr);
        min-width: 0;
        background: var(--boot-bg);
      }

      .lingua-boot-tabs {
        display: flex;
        align-items: center;
        border-bottom: 1px solid var(--boot-border);
        background: var(--boot-panel-alt);
      }

      .lingua-boot-code {
        display: grid;
        align-content: start;
        gap: 12px;
        padding: 28px 34px;
      }

      .lingua-boot-line {
        width: min(68%, 680px);
        height: 9px;
      }

      .lingua-boot-line:nth-child(2) { width: min(44%, 440px); }
      .lingua-boot-line:nth-child(3) { width: min(57%, 570px); }
      .lingua-boot-line:nth-child(4) { width: min(36%, 360px); }

      .lingua-boot-status {
        border-top: 1px solid var(--boot-border);
        background: var(--boot-panel);
      }

      @media (max-width: 720px) {
        .lingua-boot-workspace { grid-template-columns: 72px minmax(0, 1fr); }
        .lingua-boot-sidebar { padding-inline: 12px; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="lingua-boot-skeleton" data-testid="boot-skeleton" aria-hidden="true" inert>
        <div class="lingua-boot-bar">
          <span class="lingua-boot-dot"></span>
          <span class="lingua-boot-dot"></span>
          <span class="lingua-boot-dot"></span>
        </div>
        <div class="lingua-boot-workspace">
          <div class="lingua-boot-sidebar">
            <span class="lingua-boot-line"></span>
            <span class="lingua-boot-line"></span>
            <span class="lingua-boot-line"></span>
          </div>
          <div class="lingua-boot-editor">
            <div class="lingua-boot-tabs"><span class="lingua-boot-tab"></span></div>
            <div class="lingua-boot-code">
              <span class="lingua-boot-line"></span>
              <span class="lingua-boot-line"></span>
              <span class="lingua-boot-line"></span>
              <span class="lingua-boot-line"></span>
            </div>
          </div>
        </div>
        <div class="lingua-boot-status"></div>
      </div>
    </div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
