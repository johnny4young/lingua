<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP for the web build:
      - Pyodide is copied into the web build and served same-origin
        under /pyodide/ (see docs/RUNTIME_ASSETS_ADR.md).
      - blob: workers are needed for Monaco and JS/TS/Python web workers
      - 'unsafe-eval' is required by esbuild-wasm and Monaco language workers
      - licenses.linguacode.dev — RL-061 Slice 2.5 license-server endpoints
        (/licenses/activate, /licenses/status, /licenses/devices/remove);
        without this allow the per-surface device cap is silently bypassed
        and Slice 3's Devices section never reaches `serverSync='synced'`.
      - updates.linguacode.dev — RL-061 Slice 5 web update banner
        (/web/version polling); whitelisted now to avoid a follow-up CSP
        churn when the banner ships.
      - RL-097 Slice 1 — `https:` + `wss:` on connect-src so the HTTP
        workspace can issue user-initiated `fetch` calls to arbitrary
        HTTPS endpoints. This is the explicit widening that makes the
        HTTP workspace functional on web; users still cannot make
        plain-HTTP requests (no `http:` allowed) to preserve mixed-
        content protections. `wss:` covers future WebSocket pilots.
      - `img-src https:` lets the HTTP response preview render image
        bodies that the server returns under a recognised content-type.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https:; worker-src 'self' blob:; connect-src 'self' https://licenses.linguacode.dev https://updates.linguacode.dev https: wss:; base-uri 'self'; form-action 'self';"
    />
    <link rel="icon" href="%BASE_URL%favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <meta name="theme-color" content="#1e1e2e" />
    <title>Lingua</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
