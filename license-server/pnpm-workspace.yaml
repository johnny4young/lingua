# pnpm settings for the license-server project (single project, not a
# workspace). pnpm 11 reads build-script approvals here via allowBuilds
# (replaces the removed package.json onlyBuiltDependencies). esbuild
# (vitest bundling), workerd (wrangler runtime) and sharp need their
# install scripts; everything else stays blocked by default.
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true

# Keep the independent Worker toolchain on advisory-fixed transitive releases.
# These stay local to the license server because it owns a separate lockfile.
overrides:
  'esbuild': '0.28.1'
  'undici': '7.28.0'
  'vite@7.3.3': '7.3.5'
  'ws': '8.21.0'
