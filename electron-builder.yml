appId: com.lingua.app
productName: Lingua
executableName: lingua
copyright: Copyright © Lingua contributors
# package.json pins electron with a caret range; electron-builder needs the exact
# release to fetch its platform binaries. Keep in sync with the electron devDep.
electronVersion: 43.1.1
# Auto-update feed + installers both live on GitHub Releases. electron-builder
# embeds this provider into the packaged app-update.yml, so electron-updater
# fetches latest*.yml + the installer straight from the repo's Releases. No
# Cloudflare Worker, no R2, no GitHub Pages. (Releases allow 2 GB assets, so the
# 100 MB GitHub Pages cap that forces some projects onto a generic+Pages feed
# does not apply here.)
publish:
  provider: github
  owner: johnny4young
  repo: lingua
directories:
  output: out-builder
  # default is build/, which the root .gitignore excludes; use a tracked dir so
  # the macOS entitlements plist ships in the repo.
  buildResources: build-resources
# main/preload/renderer are built separately by scripts/build-desktop-bundles.mjs
# into .vite/ (package.json "main" -> .vite/build/main.js); electron-builder only
# packages the already-built output.
files:
  - .vite/build/**
  - .vite/renderer/**
  - package.json
# Flat, predictable artifact names on every platform (avoids scoped-name nesting
# that slips past non-recursive upload globs in CI).
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
asar: true
# .node addons cannot be dlopen'd from inside app.asar. Lingua has no native
# addons today; kept defensively so a future one is unpacked automatically.
asarUnpack:
  - '**/*.node'
# Deep-link scheme (lingua://) — replaces the Forge packagerConfig.protocols.
protocols:
  - name: Lingua
    schemes:
      - lingua
# Mirror the Electron fuses the Forge FusesPlugin set. Forge set only these six
# and left grantFileProtocolExtraPrivileges at the Electron default (enabled).
# The first electron-builder cut over-hardened it to false, which strips the
# file:// protocol of the privileges loadFile needs to read the renderer
# index.html out of app.asar — the packaged app then failed with
# ERR_FILE_NOT_FOUND and never rendered (the smoke gate then timed out and hung).
# Keep it enabled to match the working Forge build. asar integrity validation
# stays on; it was never the cause.
electronFuses:
  runAsNode: false
  enableCookieEncryption: true
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false
  enableEmbeddedAsarIntegrityValidation: true
  onlyLoadAppFromAsar: true
  grantFileProtocolExtraPrivileges: true
# Target formats are dictated by electron-updater's auto-install support: mac
# updates from a zip (Squirrel.Mac), windows needs an NSIS installer, linux needs
# an AppImage. mac also ships a dmg for the first manual download.
mac:
  icon: assets/icon.icns
  category: public.app-category.developer-tools
  # internal — ship BOTH mac arches. Through 0.12.0 the release only carried
  # arm64, so an Intel Mac could not install Lingua at all. Two per-arch
  # artifacts (not a `universal` build) because Lingua bundles ~96 MB of WASM
  # runtimes: a universal binary would double the download for every user to
  # serve one arch. electron-updater picks the right artifact from the arch
  # list in latest-mac.yml. Safe to cross-package from an arm64 runner —
  # Lingua has no native .node addons (see asarUnpack above).
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  entitlements: build-resources/entitlements.mac.plist
  entitlementsInherit: build-resources/entitlements.mac.plist
  # Notarization is opt-in at the workflow level: the release job enables it via
  # -c.mac.notarize=true only when the Apple secrets are present (electron-builder
  # reads APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID from the env).
  notarize: false
win:
  icon: assets/icon.ico
  target:
    - nsis
nsis:
  # Per-user install (no UAC elevation) so the silent electron-updater install
  # works without a prompt; one-click keeps the manual download a double-click
  # installer too.
  oneClick: true
  perMachine: false
linux:
  icon: assets/icon.png
  category: Development
  maintainer: johnny4young <asesordeprogramacion@gmail.com>
  target:
    - AppImage
